# DEFINE THE KATA RuntimeClass
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-qemu
handler: kata-qemu

---
# NGINX DEPLOYMENT WITH Kata RuntimeClass
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-kata-deployment
  labels:
    app: nginx-kata
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-kata
  template:
    metadata:
      labels:
        app: nginx-kata
    spec:
      runtimeClassName: kata-qemu
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80

---
# SERVICE FOR MAIN DEPLOYMENT
apiVersion: v1
kind: Service
metadata:
  name: main-service
spec:
  selector:
    app: main  # Must match the labels in your deployment
  ports:
  - port: 80           # The port the Service exposes internally
    targetPort: 8000   # The port your FastAPI container is listening on

---
# INGRESS TO EXPOSE THE SERVICE
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  annotations:
    # Optional: See explanation below regarding stripping the prefix
    # nginx.ingress.kubernetes.io/rewrite-target: /$2 
spec:
  rules:
  - http:
      paths:
      - path: /main
        pathType: Prefix
        backend:
          service:
            name: main-service
            port:
              number: 80

---

# main service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-deployment
  labels:
    app: main
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main
  template:
    metadata:
      labels:
        app: main
    spec:
      imagePullSecrets:
      - name: gar-secret
      containers:
      - name: main-container
        image: us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/tradeforces/tradeforces-main:1.1
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: app-env

---
# vm_creator service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmcreator-deployment
  labels:
    app: vm_creator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vm_creator
  template:
    metadata:
      labels:
        app: vm_creator
    spec:
      imagePullSecrets:
      - name: gar-secret
      containers:
      - name: vmcreator-container
        image: us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/tradeforces/tradeforces-vmcreator:1.1
        envFrom:
        - configMapRef:
            name: app-env