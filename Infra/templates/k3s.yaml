# DEFINE THE KATA RuntimeClass
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata-qemu
handler: kata-qemu

---
# SERVICE FOR MAIN DEPLOYMENT
apiVersion: v1
kind: Service
metadata:
  name: main-service
spec:
  selector:
    app: main
  ports:
  - port: 80
    targetPort: 8000

---
# INGRESS TO EXPOSE THE SERVICE
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  annotations:
    # nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - http:
      paths:
      - path: /main
        pathType: Prefix
        backend:
          service:
            name: main-service
            port:
              number: 80

---
# main service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-deployment
  labels:
    app: main
spec:
  replicas: 1
  selector:
    matchLabels:
      app: main
  template:
    metadata:
      labels:
        app: main
    spec:
      imagePullSecrets:
      - name: gar-secret
      containers:
      - name: main-container
        image: us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/tradeforces/tradeforces-main:1.1
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: app-env

---
# vmcreator RBAC
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vmcreator-sa
  namespace: default

---
# Role (namespace-scoped — vmcreator only touches the default namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vmcreator-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vmcreator-rolebinding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: vmcreator-sa
    namespace: default
roleRef:
  kind: Role
  name: vmcreator-role
  apiGroup: rbac.authorization.k8s.io

---
# vm_creator service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmcreator-deployment
  labels:
    app: vm_creator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vm_creator
  template:
    metadata:
      labels:
        app: vm_creator
    spec:
      serviceAccountName: vmcreator-sa
      imagePullSecrets:
      - name: gar-secret
      containers:
      - name: vmcreator-container
        image: us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/tradeforces/tradeforces-vmcreator:1.1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: app-env

---
# Pranjal's Loadgen
apiVersion: v1
kind: ServiceAccount
metadata:
  name: benchmark-controller

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: benchmark-controller
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: benchmark-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: benchmark-controller
subjects:
  - kind: ServiceAccount
    name: benchmark-controller
    namespace: default

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: benchmark-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: benchmark-controller
  template:
    metadata:
      labels:
        app: benchmark-controller
    spec:
      imagePullSecrets:
      - name: gar-secret
      serviceAccountName: benchmark-controller
      containers:
        - name: benchmark-controller
          image: us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/tradeforces/tradeforces-benchmark-controller:1.1
          imagePullPolicy: Always
          env:
            - name: NAMESPACE
              value: "default"
            - name: CONTROLLER_URL
              value: "http://benchmark-controller:8080"
            - name: RUNNER_PODS
              value: "3"
            - name: BOTS_PER_POD
              value: "100"
            - name: SCHEDULER_TICK_MS
              value: "20"
            - name: START_DELAY_MS
              value: "5000"
            - name: GCP_PROJECT_ID
              value: "project-cdd074dc-6291-4d7f-a2a"
            - name: PUBSUB_SUBSCRIPTION
              value: "queue2-6291-subscription"
            - name: RUNNER_MODE
              value: "image"
            - name: RUNNER_IMAGE
              value: "us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/tradeforces/tradeforces-bot-runner:1.1"
            - name: PHASES_JSON
              value: '[{"name":"steady","duration_seconds":20,"active_bots":100,"rps":500}]'
          ports:
            - containerPort: 8080
          envFrom:
          - configMapRef:
              name: app-env
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "768Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: benchmark-controller
spec:
  selector:
    app: benchmark-controller
  ports:
    - name: http
      port: 8080
      targetPort: 8080