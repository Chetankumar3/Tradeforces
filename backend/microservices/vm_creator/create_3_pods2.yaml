apiVersion: v1
kind: Pod
metadata:
  name: "microvm-20"
  namespace: "default"
  labels:
    submission-id: "20"
    user-id: "1"
    app: tradeforces-submission
spec:
  hostname: microvm-20
  subdomain: submission-20
  imagePullSecrets:
  - name: gar-secret
  runtimeClassName: kata-qemu
  restartPolicy: Never
  terminationGracePeriodSeconds: 30
  affinity:
    podAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchExpressions:
            - key: submission-id
              operator: In
              values:
              - "20"
            - key: app
              operator: In
              values:
              - telemetry
              - shadow
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - tradeforces-submission

  containers:
  - name: trader
    image: "us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/tradeforces/tradeforces-contestant:1.1"
    imagePullPolicy: Always
    
    ports:
    - name: http
      containerPort: 8080
      protocol: TCP
    - name: ingress
      containerPort: 9100
      protocol: TCP
    - name: egress
      containerPort: 9101
      protocol: TCP
    - name: fix
      containerPort: 9876
      protocol: TCP
    
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
            
    env:
    - name: SUBMISSION_ID
      value: "20"
    - name: USER_ID
      value: "1"
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name
    - name: POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
  

---
apiVersion: v1
kind: Service
metadata:
  name: submission-20
spec:
  clusterIP: None
  selector:
    submission-id: "20"
  ports:
  - name: ingress
    port: 9100
    targetPort: 9100
  - name: egress
    port: 9101
    targetPort: 9101

---
# Template for shadow_engine pod
apiVersion: v1
kind: Pod
metadata:
  name: shadow-20
  labels:
    submission-id: "20"
    user-id: "1"
    app: shadow
spec:
  hostname: shadow-20
  subdomain: submission-20
  imagePullSecrets:
  - name: gar-secret
  restartPolicy: Never
  terminationGracePeriodSeconds: 30
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - topologyKey: kubernetes.io/hostname
        labelSelector:
          matchExpressions:
          - key: submission-id
            operator: In
            values:
            - "20"
          - key: app
            operator: In
            values:
            - tradeforces-submission
  containers:
  - name: shadow-container
    image: us-central1-docker.pkg.dev/project-cdd074dc-6291-4d7f-a2a/tradeforces/tradeforces-shadow:1.1
    imagePullPolicy: Always
    command: ["/app/fix_gateway"]
    ports:
    - name: admin
      containerPort: 8080
    - name: redpanda
      containerPort: 9092
    - name: fix
      containerPort: 9876
    - name: telemetry
      containerPort: 9100
    env:
    - name: SUBMISSION_ID
      value: "20"
    - name: REDPANDA_ORDERS_TOPIC
      value: "20"
    envFrom:
    - configMapRef:
        name: app-env